<!DOCTYPE html>
<html>
<head>
<title>STUDENT REGISTRATION FORM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2><center><u><b><i>STUDENT REGISTRATION FORM</i></b></u></center></h2><br><br>
<form>
<label>Full Name:</label><br>
<input type="text" placeholder="Enter Full Name"><br><br>
<label>Email:</label><br>
<input type="email" placeholder="Enter Your Email"><br><br>
<label>Password:</label><br>
<input type="password" placeholder="Enter Your Password"><br><br>
<label>Phone Number:</label><br>
<input type="tel" placeholder="Enter Your Phone Number"><br><br>
<label>Date of Birth:</label><br>
<input type="date" placeholder="Enter Your Birthday"><br><br>
<label>Address:</label><br>
<input type="text" placeholder="Enter Your Address"><br><br>
<label>Gender:</label><br>
<input type="radio" name="gender" value="Male">Male
<input type="radio" name="gender" value="Female">Female<br><br>
<label>Select Your Faculty</label><br>
<input type="checkbox" name="course" value="Faculty of Applied Science">Faculty of Applied Science<br>
<input type="checkbox" name="course" value="Faculty of Business Studies">Faculty of Business Studies<br>
<input type="checkbox" name="course" value="Faculty of Technologhy">Faculty of Technologhy<br><br>
<label>Select Your Year</label>
<select>
<option>1st Year<option>
<option>2nd Year<option>
<option>3rd Year<option>
<option>4th Year<option>
</select><br><br>
<label>Comment:</label><br>
<textarea placeholder="Enter your message here..."></textarea><br><br>
<button type="submit">Submit</button>

</form>

</body>
</html>
